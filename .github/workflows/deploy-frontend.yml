name: Deploy frontend (Azure Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "css/**"
      - "js/**"
      - "assets/**"
      - "manifest.json"
      - "service-worker.js"
      - "staticwebapp.config.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure API proxy to App Service
        env:
          BACKEND_HOST: ${{ secrets.AZURE_BACKEND_HOST }}
        run: |
          if [ -z "$BACKEND_HOST" ]; then
            echo "AZURE_BACKEND_HOST secret is required (e.g. https://your-app.azurewebsites.net)"
            exit 1
          fi
          BACKEND_HOST="${BACKEND_HOST%/}"
          sed -i "s|__BACKEND_HOST__|${BACKEND_HOST}|g" staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: ""
          skip_app_build: true
