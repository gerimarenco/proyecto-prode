name: Deploy backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - "prode-backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22"
      # Required for prisma generate (postinstall) and migrate deploy (prisma.config.ts)
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::GitHub secret DATABASE_URL is not set (Settings → Secrets and variables → Actions)."
            missing=1
          fi
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "::error::GitHub secret AZURE_CLIENT_ID is not set. See DEPLOY.md (OIDC)."
            missing=1
          fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "::error::GitHub secret AZURE_TENANT_ID is not set."
            missing=1
          fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "::error::GitHub secret AZURE_SUBSCRIPTION_ID is not set."
            missing=1
          fi
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]; then
            echo "::error::GitHub secret AZURE_WEBAPP_NAME is not set (short name only, not the full URL)."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: prode-backend/package-lock.json

      - name: Install dependencies
        working-directory: prode-backend
        run: npm ci

      - name: Run Prisma migrations
        working-directory: prode-backend
        run: npx prisma migrate deploy

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: prode-backend
