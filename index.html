<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProdeFootball</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url("assets/cancha.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color:white;
}
}

nav{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

nav a{
  color:white;
  text-decoration:none;
}

nav a:hover{
  color:#00ff88;
}

.container{
  max-width:700px;
  margin:60px auto;
  padding:30px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

h1{
  text-align:center;
  color:#00ff88;
  margin-bottom:30px;
}

.card{
  background:rgba(20,20,20,0.8);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#00ff88;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc66;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="pages/partidos.html">Partidos</a>
  <a href="pages/predicciones.html">Predicciones</a>
  <a href="pages/clasificacion.html">Ranking</a>
</nav>

<div class="container">
  <h1>⚽ PREDECÍ LOS PARTIDOS</h1>

  <div id="partidos"></div>
</div>

<script>
// DATOS DE PRUEBA (para que funcione sin backend)
const partidos = [
  { equipo1: "Boca", equipo2: "River" },
  { equipo1: "Barcelona", equipo2: "Real Madrid" },
  { equipo1: "PSG", equipo2: "Manchester City" }
];

const contenedor = document.getElementById("partidos");

partidos.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <span>${p.equipo1}</span>
    <span>VS</span>
    <span>${p.equipo2}</span>
    <button>Predecir</button>
  `;

  contenedor.appendChild(card);
});
</script>

</body>
</html>
