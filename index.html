<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProdeFootball</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url("assets/cancha.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color:white;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

nav a{
  color:white;
  text-decoration:none;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

.card{
  background:rgba(20,20,20,0.8);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
}

input{
  width:50px;
}

#nombre{
  width:100%;
  padding:10px;
  margin-bottom:15px;
}

button{
  background:#00ff88;
  border:none;
  padding:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="pages/predicciones.html">Predicciones</a>
  <a href="pages/clasificacion.html">Ranking</a>
</nav>

<div class="container">
  <h1>⚽ PRODE</h1>

  <input id="nombre" placeholder="Tu nombre">

  <div id="partidos"></div>
</div>

<script>

const partidos = [
  { equipo1: "Boca", equipo2: "River", resultado: "2-1" },
  { equipo1: "Barcelona", equipo2: "Real Madrid", resultado: "1-1" }
];

const contenedor = document.getElementById("partidos");

partidos.forEach(p => {
  const div = document.createElement("div");

  div.className = "card";

  div.innerHTML = `
    ${p.equipo1} vs ${p.equipo2}
    <input id="g1-${p.equipo1}">
    <input id="g2-${p.equipo2}">
    <button onclick="guardar('${p.equipo1}','${p.equipo2}')">OK</button>
  `;

  contenedor.appendChild(div);
});

function guardar(e1,e2){
  const g1 = document.getElementById(`g1-${e1}`).value;
  const g2 = document.getElementById(`g2-${e2}`).value;
  const nombre = document.getElementById("nombre").value;

  if(nombre === ""){
    alert("Poné tu nombre");
    return;
  }

  const pred = {
    jugador:nombre,
    partido:`${e1} vs ${e2}`,
    resultado:`${g1}-${g2}`,
    real: partidos.find(p=>p.equipo1===e1).resultado
  };

  let datos = JSON.parse(localStorage.getItem("predicciones")) || [];
  datos.push(pred);

  localStorage.setItem("predicciones",JSON.stringify(datos));

  alert("Guardado");
}

</script>

</body>
</html>
