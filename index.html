<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Once Metros</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a class="logo" href="index.html"><span class="logo-pulse"></span>Once Metros</a>
      <div class="nav-links">
        <a href="index.html" class="active">Competencias</a>
        <a href="pages/partidos.html">Predicciones</a>
        <a href="index.html#torneos">Torneos</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section home-shell">
      <div id="home-error" class="auth-error hidden"></div>

      <section id="competition-picker" class="workspace-pane">
        <div class="section-header">
          <div>
            <span class="section-label"><span class="dot"></span>Disponibles</span>
            <h1 class="page-title">Competencias</h1>
          </div>
        </div>
        <div id="competencias-list" class="competition-list"></div>
      </section>

      <section id="competencia-workspace" class="hidden">
        <div class="screen-top">
          <button class="icon-btn" data-back-to-competencias aria-label="Volver a competencias">‹</button>
          <div class="screen-title">
            <span class="section-label"><span class="dot"></span>Competencia</span>
            <h1 id="competencia-title" class="page-title">Competencia</h1>
          </div>
        </div>

        <div class="tabs workspace-tabs">
          <button class="tab-btn active" data-home-tab="predicciones">Predicciones</button>
          <button class="tab-btn" data-home-tab="torneos">Torneos de Amigos</button>
        </div>

        <div id="home-tab-predicciones" class="tab-content">
          <div class="filters-bar">
            <button class="filter-chip active" data-group="estado" data-value="">Todos</button>
            <button class="filter-chip" data-group="estado" data-value="proximo">Próximos</button>
            <button class="filter-chip" data-group="estado" data-value="en-vivo">En vivo</button>
            <button class="filter-chip" data-group="estado" data-value="finalizado">Finalizados</button>
          </div>
          <div id="matches-list" class="matches-grid"></div>
        </div>

        <div id="home-tab-torneos" class="tab-content hidden">
          <form id="create-torneo-form" class="inline-form hidden">
            <input name="nombre" placeholder="Nombre del torneo" required maxlength="80">
            <button class="btn btn-primary" type="submit">Crear</button>
          </form>
          <div id="torneos-list" class="tournament-list"></div>
        </div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a class="bottom-nav__item active" href="index.html">Competencias</a>
      <a class="bottom-nav__item" href="pages/partidos.html">Predicciones</a>
      <a class="bottom-nav__item" href="index.html#torneos">Torneos</a>
    </div>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/predictions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
