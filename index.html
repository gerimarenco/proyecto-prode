<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Once Metros</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a class="logo" href="index.html"><span class="logo-pulse"></span>Once Metros</a>
      <div class="nav-links">
        <a href="index.html" class="active">Inicio</a>
        <a href="pages/partidos.html">Partidos</a>
        <a href="pages/predicciones.html">Predicciones</a>
        <a href="pages/clasificacion.html">Ranking</a>
        <a href="pages/auth.html" data-auth-link data-auth-href="pages/auth.html">Ingresar</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-field"></div>
      <div class="hero-inner">
        <div class="hero-content">
          <div class="hero-eyebrow">Prode entre amigos</div>
          <h1>Once Metros</h1>
          <p class="hero-desc">Predicciones, puntajes y tabla del torneo en vivo.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="pages/partidos.html">Ver partidos</a>
            <a class="btn btn-ghost" href="pages/clasificacion.html">Ver ranking</a>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div>
          <span class="section-label"><span class="dot"></span>Próximos</span>
          <h2>Partidos para predecir</h2>
        </div>
        <a class="section-link" href="pages/partidos.html">Todos</a>
      </div>
      <div id="featured-matches" class="matches-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <div>
          <span class="section-label"><span class="dot"></span>Tabla</span>
          <h2>Ranking general</h2>
        </div>
        <a class="section-link" href="pages/clasificacion.html">Ver ranking</a>
      </div>
      <div id="top-ranking" class="ranking-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a class="bottom-nav__item active" href="index.html">Inicio</a>
      <a class="bottom-nav__item" href="pages/partidos.html">Partidos</a>
      <a class="bottom-nav__item" href="pages/predicciones.html">Predicciones</a>
      <a class="bottom-nav__item" href="pages/clasificacion.html">Ranking</a>
      <a class="bottom-nav__item" href="pages/auth.html" data-auth-link data-auth-href="pages/auth.html">Ingresar</a>
    </div>
  </nav>

  <script src="js/mock-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/predictions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
