<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProdeFootball</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url("assets/cancha.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color:white;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

nav a:hover{
  color:#00ff88;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

h1{
  text-align:center;
  color:#00ff88;
  margin-bottom:20px;
  font-size:22px;
}

.card{
  background:rgba(20,20,20,0.8);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  font-size:14px;
}

input{
  width:50px;
  padding:5px;
  border-radius:5px;
  border:none;
  text-align:center;
}

button{
  background:#00ff88;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc66;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="pages/partidos.html">Partidos</a>
  <a href="pages/predicciones.html">Predicciones</a>
  <a href="pages/clasificacion.html">Ranking</a>
</nav>

<div class="container">
  <h1>⚽ PREDECÍ LOS PARTIDOS</h1>
  <div id="partidos"></div>
</div>

<script>

// PARTIDOS + RESULTADOS REALES
const partidos = [
  { equipo1: "Boca", equipo2: "River", resultado: "2-1" },
  { equipo1: "Barcelona", equipo2: "Real Madrid", resultado: "1-1" },
  { equipo1: "PSG", equipo2: "Manchester City", resultado: "0-2" }
];

const contenedor = document.getElementById("partidos");

// CREAR CARDS
partidos.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <span>${p.equipo1}</span>
    <span>VS</span>
    <span>${p.equipo2}</span>

    <input type="number" min="0" placeholder="0" id="g1-${p.equipo1}">
    <input type="number" min="0" placeholder="0" id="g2-${p.equipo2}">

    <button onclick="guardar('${p.equipo1}','${p.equipo2}')">Guardar</button>
  `;

  contenedor.appendChild(card);
});

// GUARDAR PREDICCIONES
function guardar(e1, e2){
  const g1 = document.getElementById(`g1-${e1}`).value;
  const g2 = document.getElementById(`g2-${e2}`).value;

  if(g1 === "" || g2 === ""){
    alert("Completá los goles");
    return;
  }

  const partidoData = partidos.find(p => p.equipo1 === e1 && p.equipo2 === e2);

  const pred = {
    partido: `${e1} vs ${e2}`,
    resultado: `${g1}-${g2}`,
    real: partidoData.resultado
  };

  let preds = JSON.parse(localStorage.getItem("predicciones")) || [];
  preds.push(pred);

  localStorage.setItem("predicciones", JSON.stringify(preds));

  alert("Predicción guardada ⚽");
}

</script>

</body>
</html>
