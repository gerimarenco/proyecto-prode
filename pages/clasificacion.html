<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url("../assets/cancha.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color:white;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

nav a{
  color:white;
  text-decoration:none;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

h1{
  text-align:center;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">Inicio</a>
  <a href="predicciones.html">Predicciones</a>
  <a href="clasificacion.html">Ranking</a>
</nav>

<div class="container">
  <h1>🏆 Ranking</h1>
  <div id="tabla"></div>
</div>

<script>

const tabla = document.getElementById("tabla");
let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

function puntos(pred, real){
  if(pred === real) return 3;

  const [a,b] = pred.split("-").map(Number);
  const [c,d] = real.split("-").map(Number);

  const resPred = a>b ? 1 : a<b ? 2 : 0;
  const resReal = c>d ? 1 : c<d ? 2 : 0;

  if(resPred === resReal) return 1;
  return 0;
}

let jugadores = {};

preds.forEach(p=>{
  if(!jugadores[p.jugador]){
    jugadores[p.jugador]=0;
  }
  jugadores[p.jugador]+=puntos(p.resultado,p.real);
});

// ORDENAR
let ranking = Object.entries(jugadores).sort((a,b)=>b[1]-a[1]);

if(ranking.length === 0){
  tabla.innerHTML = "No hay datos todavía";
} else {
  ranking.forEach((j,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `#${i+1} ${j[0]} → ${j[1]} pts`;
    tabla.appendChild(div);
  });
}

</script>

</body>
</html>
