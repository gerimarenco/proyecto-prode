<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

nav a{
  color:white;
  text-decoration:none;
}

h1{
  text-align:center;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">Inicio</a>
  <a href="predicciones.html">Predicciones</a>
  <a href="clasificacion.html">Ranking</a>
</nav>

<h1>🏆 Ranking</h1>

<div id="tabla"></div>

<script>

const tabla = document.getElementById("tabla");
let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

function puntos(pred, real){
  if(pred === real) return 3;

  const [a,b] = pred.split("-").map(Number);
  const [c,d] = real.split("-").map(Number);

  const resPred = a>b ? 1 : a<b ? 2 : 0;
  const resReal = c>d ? 1 : c<d ? 2 : 0;

  if(resPred === resReal) return 1;
  return 0;
}

let jugadores = {};

preds.forEach(p=>{
  if(!jugadores[p.jugador]){
    jugadores[p.jugador]=0;
  }
  jugadores[p.jugador]+=puntos(p.resultado,p.real);
});

if(Object.keys(jugadores).length === 0){
  tabla.innerHTML = "No hay datos todavía";
} else {
  Object.entries(jugadores).forEach(j=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `${j[0]} → ${j[1]} pts`;
    tabla.appendChild(div);
  });
}

</script>

</body>
</html>
