<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<h1>🏆 Ranking</h1>

<div id="tabla"></div>

<script>

const tabla = document.getElementById("tabla");
let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

function calcularPuntos(pred, real){
  if(pred === real) return 3;

  const [g1, g2] = pred.split("-").map(Number);
  const [r1, r2] = real.split("-").map(Number);

  const ganadorPred = g1 > g2 ? "1" : g1 < g2 ? "2" : "X";
  const ganadorReal = r1 > r2 ? "1" : r1 < r2 ? "2" : "X";

  if(ganadorPred === ganadorReal) return 1;

  return 0;
}

// AGRUPAR POR JUGADOR
let jugadores = {};

preds.forEach(p => {
  const puntos = calcularPuntos(p.resultado, p.real);

  if(!jugadores[p.jugador]){
    jugadores[p.jugador] = 0;
  }

  jugadores[p.jugador] += puntos;
});

// ORDENAR
let ranking = Object.entries(jugadores)
  .sort((a,b) => b[1] - a[1]);

// MOSTRAR
if(ranking.length === 0){
  tabla.innerHTML = "No hay datos todavía";
} else {
  ranking.forEach((j, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <span>#${i+1} ${j[0]}</span>
      <span>🏆 ${j[1]} pts</span>
    `;

    tabla.appendChild(div);
  });
}

</script>

</body>
</html>
