<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicciones</title>

<style>
body{
  font-family:sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url("../assets/cancha.jpg");
  background-size: cover;
  color:white;
  padding:20px;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
}

.card{
  background:#222;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">Inicio</a>
  <a href="predicciones.html">Predicciones</a>
  <a href="clasificacion.html">Ranking</a>
</nav>

<h1>📊 Predicciones</h1>

<div id="lista"></div>

<script>
const lista = document.getElementById("lista");

let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

preds.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `${p.jugador} → ${p.partido} → ${p.resultado}`;
  lista.appendChild(div);
});
</script>

</body>
</html>
