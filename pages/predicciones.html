<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicciones</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<h1>📊 Tus predicciones</h1>

<div id="lista"></div>

<script>
const lista = document.getElementById("lista");

let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

if(preds.length === 0){
  lista.innerHTML = "No hay predicciones todavía";
}

preds.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <span>${p.jugador}</span>
    <span>${p.partido}</span>
    <span>${p.resultado}</span>
  `;

  lista.appendChild(div);
});
</script>

</body>
</html>
