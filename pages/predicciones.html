<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicciones</title>

<style>
body{
  font-family: 'Poppins', sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.boton{
  display:block;
  margin:20px auto;
  padding:10px;
  background:#00ff88;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.boton:hover{
  background:#00cc66;
}
</style>
</head>

<body>

<h1>📊 Tus predicciones</h1>

<div id="lista"></div>

<button class="boton" onclick="borrar()">Borrar todo</button>

<script>
const lista = document.getElementById("lista");

let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

if(preds.length === 0){
  lista.innerHTML = "No hay predicciones todavía";
}

preds.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <span>${p.partido}</span>
    <span>${p.resultado}</span>
  `;

  lista.appendChild(div);
});

function borrar(){
  localStorage.removeItem("predicciones");
  location.reload();
}
</script>

</body>
</html>
