<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicciones</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

nav a{
  color:white;
  text-decoration:none;
}

h1{
  text-align:center;
  color:#00ff88;
}

.card{
  background:#222;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">Inicio</a>
  <a href="predicciones.html">Predicciones</a>
  <a href="clasificacion.html">Ranking</a>
</nav>

<h1>📊 Tus predicciones</h1>

<div id="lista"></div>

<script>
const lista = document.getElementById("lista");

let preds = JSON.parse(localStorage.getItem("predicciones")) || [];

if(preds.length === 0){
  lista.innerHTML = "No hay predicciones todavía";
}

preds.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `${p.jugador} → ${p.partido} → ${p.resultado}`;
  lista.appendChild(div);
});
</script>

</body>
</html>
