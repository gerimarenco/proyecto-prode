<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partidos | Once Metros</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a class="logo" href="../index.html"><span class="logo-pulse"></span>Once Metros</a>
      <div class="nav-links">
        <a href="../index.html">Competencias</a>
        <a href="partidos.html" class="active">Predicciones</a>
        <a href="../index.html#torneos">Torneos</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-header page-header--compact">
      <div class="page-header-inner">
        <a class="icon-btn" href="../index.html#predicciones" aria-label="Volver">‹</a>
        <div>
          <span class="section-label"><span class="dot"></span>Competencia</span>
          <h1 class="page-title">Partidos</h1>
        </div>
        <div id="selected-context" class="selected-context"></div>
      </div>
    </section>

    <section class="section">
      <div class="filters-bar">
        <button class="filter-chip active" data-group="estado" data-value="">Todos</button>
        <button class="filter-chip" data-group="estado" data-value="proximo">Próximos</button>
        <button class="filter-chip" data-group="estado" data-value="en-vivo">En vivo</button>
        <button class="filter-chip" data-group="estado" data-value="finalizado">Finalizados</button>
      </div>
      <div id="matches-list" class="matches-grid"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a class="bottom-nav__item" href="../index.html">Competencias</a>
      <a class="bottom-nav__item active" href="partidos.html">Predicciones</a>
      <a class="bottom-nav__item" href="../index.html#torneos">Torneos</a>
    </div>
  </nav>

  <script src="../js/api.js"></script>
  <script src="../js/predictions.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
