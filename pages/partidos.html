<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Partidos</title>
</head>

<body style="background:black; color:white; font-family:sans-serif;">

<h1>PARTIDOS FUNCIONANDO</h1>

<div id="partidos">Cargando...</div>

<script>
fetch("http://localhost:3000/partidos")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("partidos");
    contenedor.innerHTML = "";

    data.forEach(p => {
      const partido = document.createElement("p");
      partido.textContent = p.equipo1 + " vs " + p.equipo2;
      contenedor.appendChild(partido);
    });
  })
  .catch(err => {
    document.getElementById("partidos").innerHTML = "ERROR AL CARGAR";
    console.log(err);
  });
</script>

</body>
</html>
